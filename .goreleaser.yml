version: 2
# .goreleaser.yml for InfernoSIM v3
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    main: ./cmd/agent/main.go
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.versionBy=goreleaser
archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: infernosim
    repository:
      owner: pranaysparihar
      name: homebrew-infernosim

    homepage: "https://github.com/pranaysparihar/InfernoSIM"
    description: "Deterministic incident replay for backend systems"
    license: "MIT"

    commit_author:
      name: Pranay Singh Parihar
      email: pranaysparihar@gmail.com

    install: |
      bin.install "InfernoSIM"
